name: Publish npm package

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to npm, e.g. v0.1.2"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-npm-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish-npm:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push'
        )
      }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Require NPM_TOKEN
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not configured"
            exit 1
          fi

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Could not resolve release tag"
            exit 1
          fi

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release '$TAG' was not found directly. Trying to resolve by target commit..."

            RUN_SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="$(gh release list \
              --repo "${{ github.repository }}" \
              --limit 50 \
              --json tagName,targetCommitish,isDraft \
              --jq ".[] | select(.isDraft == false and .targetCommitish == \"$RUN_SHA\") | .tagName" \
              | head -n 1)"

            if [ -z "$TAG" ]; then
              echo "Could not find a GitHub Release for workflow_run head_sha='${{ github.event.workflow_run.head_sha }}'"
              exit 1
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Download npm package artifact from the GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts

          gh release download "${{ steps.resolve.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*-npm-package.tar.gz" \
            --dir artifacts

          PACKAGE="$(find artifacts -maxdepth 1 -type f -name '*-npm-package.tar.gz' | head -n 1)"

          if [ -z "$PACKAGE" ]; then
            echo "No npm package artifact found in the release assets"
            exit 1
          fi

          echo "Downloaded artifacts:"
          ls -lah artifacts

          echo "Inspecting npm package tarball:"
          tar -tzf "$PACKAGE" | head -n 40

          # npm can interpret paths without ./ as package specs, including GitHub shorthand.
          # Keep an explicit relative path so npm treats this as a local tarball.
          echo "PACKAGE=./$PACKAGE" >> "$GITHUB_ENV"
          echo "Resolved package: ./$PACKAGE"

      - name: Resolve release prerelease flag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          IS_PRERELEASE="$(gh release view "${{ steps.resolve.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --json isPrerelease \
            --jq '.isPrerelease')"

          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Release prerelease: $IS_PRERELEASE"

      - name: Publish package to npm
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.release.outputs.is_prerelease }}" = "true" ]; then
            npm publish "$PACKAGE" --access public --tag next
          else
            npm publish "$PACKAGE" --access public
          fi
